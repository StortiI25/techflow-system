{% extends "base.html" %}{% block content %}<div class="page-title"><div><h1>Personalização</h1><p>Preferências do usuário.</p></div></div><div class="row g-4"><div class="col-lg-4"><div class="profile-card"><div class="profile-avatar">{{user.nome[0]|upper}}</div><h3>{{user.nome}}</h3><p>{{user.email}}</p><span class="badge bg-primary">{{user.perfil}}</span></div></div><div class="col-lg-8"><form method="post" class="panel"><h4>Editar perfil</h4><label>Nome</label><input class="form-control mb-3" name="nome" value="{{user.nome}}" required><label>Tema</label><select class="form-control mb-3" name="tema"><option value="dark">Escuro</option><option value="light">Claro</option></select><label>Notificações</label><select class="form-control mb-3" name="notificacoes"><option value="sim">Ativadas</option><option value="nao">Desativadas</option></select><label>Nova senha</label><input class="form-control mb-3" name="senha" type="password" placeholder="Deixe vazio para manter"><button class="btn btn-primary">Salvar</button></form></div></div>{% endblock %}
