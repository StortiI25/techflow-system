{% extends "base.html" %}{% block content %}<div class="page-title"><div><h1>Personalização do Usuário</h1><p>Configure nome, tema, senha e notificações.</p></div></div><div class="row g-4"><div class="col-lg-4"><div class="profile-card"><div class="profile-avatar">{{user.nome[0]|upper}}</div><h3>{{user.nome}}</h3><p>{{user.email}}</p><span class="badge bg-primary">{{user.perfil}}</span></div></div><div class="col-lg-8"><form method="post" class="panel"><h4>Editar preferências</h4><label>Nome</label><input class="form-control mb-3" name="nome" value="{{user.nome}}" required><label>Tema favorito</label><select class="form-control mb-3" name="tema"><option value="dark" {% if user.tema=='dark' %}selected{% endif %}>Escuro</option><option value="light" {% if user.tema=='light' %}selected{% endif %}>Claro</option></select><label>Notificações</label><select class="form-control mb-3" name="notificacoes"><option value="sim" {% if user.notificacoes=='sim' %}selected{% endif %}>Ativadas</option><option value="nao" {% if user.notificacoes=='nao' %}selected{% endif %}>Desativadas</option></select><label>Nova senha</label><input class="form-control mb-3" name="senha" type="password" placeholder="Deixe vazio para manter"><button class="btn btn-primary">Salvar</button></form></div></div>{% endblock %}
