{% extends "base.html" %}{% block public %}<section class="auth-page"><form method="post" class="auth-card"><h2>Recuperar senha</h2>{% with messages = get_flashed_messages(with_categories=true) %}{% for cat,msg in messages %}<div class="alert alert-{{cat}}">{{msg}}</div>{% endfor %}{% endwith %}<input class="form-control" name="email" type="email" placeholder="E-mail" required><button class="btn btn-primary w-100 mt-3">Enviar</button><a href="/login" class="d-block text-center mt-3">Voltar</a></form></section>{% endblock %}
