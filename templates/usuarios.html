{% extends "base.html" %}{% block content %}<div class="page-title"><div><h1>Usuários</h1><p>Permissões: admin, funcionário e visualizador</p></div></div><div class="row g-4"><div class="col-lg-4"><form method="post" class="panel"><h4>Novo usuário</h4><input class="form-control mb-3" name="nome" placeholder="Nome"><input class="form-control mb-3" name="email" type="email" placeholder="E-mail"><input class="form-control mb-3" name="senha" type="password" placeholder="Senha"><select class="form-control mb-3" name="perfil"><option>admin</option><option>funcionario</option><option>visualizador</option></select><button class="btn btn-primary w-100">Cadastrar</button></form></div><div class="col-lg-8"><div class="panel table-responsive"><table class="table table-tech"><tr><th>Nome</th><th>Email</th><th>Perfil</th></tr>{% for u in usuarios %}<tr><td>{{u.nome}}</td><td>{{u.email}}</td><td><span class="badge bg-primary">{{u.perfil}}</span></td></tr>{% endfor %}</table></div></div></div>{% endblock %}
