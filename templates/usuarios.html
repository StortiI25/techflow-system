{% extends "base.html" %}{% block content %}<div class="page-title"><div><h1>Usuários</h1><p>Permissões do sistema.</p></div></div><div class="row g-4"><div class="col-lg-4"><form method="post" class="panel"><h4>Novo usuário</h4><input class="form-control mb-3" name="nome" placeholder="Nome" required><input class="form-control mb-3" name="email" type="email" placeholder="Email" required><input class="form-control mb-3" name="senha" type="password" placeholder="Senha" required><select class="form-control mb-3" name="perfil"><option value="admin">Admin</option><option value="funcionario">Funcionário</option><option value="visualizador">Visualizador</option></select><button class="btn btn-primary w-100">Cadastrar</button></form></div><div class="col-lg-8"><div class="panel table-responsive"><table class="table table-tech"><thead><tr><th>Nome</th><th>Email</th><th>Perfil</th><th>Criado</th></tr></thead><tbody>{% for u in usuarios %}<tr><td>{{u.nome}}</td><td>{{u.email}}</td><td><span class="badge bg-primary">{{u.perfil}}</span></td><td>{{u.criado_em}}</td></tr>{% endfor %}</tbody></table></div></div></div>{% endblock %}
