{% extends "base.html" %}{% block content %}<div class="page-title"><div><h1>Auditoria</h1><p>Histórico inalterável do sistema.</p></div><span class="status-badge">Read-only</span></div><form class="search-bar"><input class="form-control" name="usuario" value="{{usuario}}" placeholder="Usuário"><input class="form-control" name="produto" value="{{produto}}" placeholder="Produto"><input class="form-control" name="data" value="{{data}}" placeholder="Data"><button class="btn btn-primary">Filtrar</button></form><div class="panel table-responsive"><table class="table table-tech"><thead><tr><th>Usuário</th><th>Ação</th><th>Produto</th><th>Data/Hora</th></tr></thead><tbody>{% for l in logs %}<tr><td>{{l.usuario_nome}}</td><td>{{l.acao}}</td><td>{{l.produto_nome or '-'}}</td><td>{{l.data_hora}}</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
