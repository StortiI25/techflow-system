{% extends "base.html" %}{% block content %}<div class="panel form-panel"><h1>Editar produto</h1><form method="post"><input class="form-control mb-3" name="codigo_barras" value="{{p.codigo_barras}}"><input class="form-control mb-3" name="nome" value="{{p.nome}}" required><input class="form-control mb-3" name="categoria" value="{{p.categoria}}"><input class="form-control mb-3" name="preco_custo" type="number" step="0.01" value="{{p.preco_custo}}"><input class="form-control mb-3" name="preco_venda" type="number" step="0.01" value="{{p.preco_venda}}"><input class="form-control mb-3" name="estoque" type="number" value="{{p.estoque}}"><input class="form-control mb-3" name="estoque_minimo" type="number" value="{{p.estoque_minimo}}"><button class="btn btn-primary">Salvar</button> <a class="btn btn-outline-secondary" href="/produtos">Cancelar</a></form></div>{% endblock %}
