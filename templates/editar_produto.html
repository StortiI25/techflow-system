{% extends "base.html" %}{% block content %}<div class="panel"><h1>Editar produto</h1><form method="post"><input class="form-control mb-3" name="nome" value="{{p.nome}}" required><input class="form-control mb-3" name="categoria" value="{{p.categoria}}"><input class="form-control mb-3" name="preco" type="number" step="0.01" value="{{p.preco}}"><input class="form-control mb-3" name="estoque" type="number" value="{{p.estoque}}"><input class="form-control mb-3" name="estoque_minimo" type="number" value="{{p.estoque_minimo}}"><button class="btn btn-primary">Salvar</button></form></div>{% endblock %}
