{% extends "base.html" %}{% block content %}<div class="page-title"><div><h1>Clientes</h1><p>Cadastro, edição, busca e exclusão</p></div></div><form class="search"><input class="form-control" name="q" value="{{busca}}" placeholder="Buscar cliente"><button class="btn btn-primary">Buscar</button></form><div class="row g-4"><div class="col-lg-4"><form method="post" class="panel"><h4>Novo cliente</h4><input class="form-control mb-3" name="nome" placeholder="Nome" required><input class="form-control mb-3" name="email" placeholder="E-mail"><input class="form-control mb-3" name="telefone" placeholder="Telefone"><input class="form-control mb-3" name="endereco" placeholder="Endereço"><button class="btn btn-primary w-100">Cadastrar</button></form></div><div class="col-lg-8"><div class="panel table-responsive"><table class="table table-tech"><tr><th>Nome</th><th>E-mail</th><th>Telefone</th><th>Ações</th></tr>{% for c in clientes %}<tr><td>{{c.nome}}</td><td>{{c.email}}</td><td>{{c.telefone}}</td><td><a class="btn btn-sm btn-warning" href="/clientes/editar/{{c.id}}">Editar</a>{% if usuario_perfil=='admin' %} <a class="btn btn-sm btn-danger" href="/clientes/excluir/{{c.id}}">Excluir</a>{% endif %}</td></tr>{% endfor %}</table></div></div></div>{% endblock %}
