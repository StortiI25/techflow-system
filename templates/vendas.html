{% extends "base.html" %}{% block content %}<div class="page-title"><div><h1>Saída de Estoque</h1><p>Registre movimentações e baixa de produtos</p></div></div><div class="row g-4"><div class="col-lg-5"><form method="post" class="panel"><h4>Nova saída de estoque</h4><select class="form-control mb-3" name="cliente_id" required><option value="">Cliente</option>{% for c in clientes %}<option value="{{c.id}}">{{c.nome}}</option>{% endfor %}</select><div id="itens"><div class="item-venda"><select class="form-control" name="produto_id">{% for p in produtos %}<option value="{{p.id}}">{{p.nome}} - R$ {{ "%.2f"|format(p.preco) }}</option>{% endfor %}</select><input class="form-control" name="quantidade" type="number" min="1" value="1"></div></div><button type="button" class="btn btn-outline-primary mt-3" onclick="addItem()">+ Item</button><button class="btn btn-primary w-100 mt-3">Registrar saída</button></form></div><div class="col-lg-7"><div class="panel table-responsive"><h4>Histórico de movimentações</h4><table class="table table-tech"><tr><th>Cliente</th><th>Total</th><th>Data</th></tr>{% for v in vendas %}<tr><td>{{v.cliente}}</td><td>R$ {{ "%.2f"|format(v.total) }}</td><td>{{v.data_venda}}</td></tr>{% endfor %}</table></div></div></div><script>function addItem(){document.getElementById('itens').insertAdjacentHTML('beforeend',document.querySelector('.item-venda').outerHTML)}</script>{% endblock %}
